services:
  nginx:
    image: nginx:1.29.8-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - tax-calculator
    restart: unless-stopped
    networks:
      - web
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  tax-calculator:
    image: xpanov00/tax-calculator:latest
    expose:
      - 8000
    deploy:
      replicas: 3
    restart: unless-stopped
    environment:
      ANNUAL_THRESHOLD_CZK: 1676052
      APP_ENV: production
      CORS_ALLOWED_ORIGINS: "*"
  networks:
    - web

networks:
  web:
    driver: bridge
