worker_processes auto;
events {
  worker_connections 1024;
}
http {
  resolver 127.0.0.11 valid=10s ipv6=off;
  server_tokens off;
  client_max_body_size 25m;
  client_body_timeout 60s;
  proxy_connect_timeout 5s;
  proxy_send_timeout 60s;
  proxy_read_timeout 120s;
  log_format main '$remote_addr - $request_time "$request" '
                  '$status $body_bytes_sent upstream=$upstream_addr';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;
  gzip on;
  gzip_types application/json text/plain;

  map $host $backend_pool {
    default tax-calculator:8000;
  }

    map $host $frontend_pool {
        default frontend:3000;
    }

  server {
    listen 80;
    server_name _;
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
    }

    location /api/ {
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://$backend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_request_buffering off;
        add_header X-Upstream $upstream_addr always;
    }

    location / {
        proxy_pass http://$frontend_pool;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
  }
}
