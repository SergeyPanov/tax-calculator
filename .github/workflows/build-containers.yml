name: Build containers
on:
  workflow_call: {}
concurrency:
  group: build-containers
  cancel-in-progress: false

jobs:
  build-containers:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: backend
            context: .
            dockerfile: backend/Dockerfile
            dockerhub-project-name: tax-calculator
            build_args: ""

          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            dockerhub-project-name: tax-calculator-frontend
            build_args: |
              NEXT_PUBLIC_BACKEND_URL=${{ vars.NEXT_PUBLIC_BACKEND_URL }}

    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata
        id: meta
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          platforms: linux/amd64
          provenance: true
          sbom: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.dockerhub-project-name }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.dockerhub-project-name }}:${{ steps.meta.outputs.SHORT_SHA }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
