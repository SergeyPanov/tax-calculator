name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    # Mirrors the Nix dev environment declared in shell.nix:
    #   pkgs.python3       -> actions/setup-python@v5 (python-version: "3.12")
    #   pkgs.poppler-utils -> apt: poppler-utils
    #   pkgs.tesseract     -> apt: tesseract-ocr, tesseract-ocr-ces (Czech language data)
    #   pkgs.git           -> apt: git
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (mirrors shell.nix)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            git \
            poppler-utils \
            tesseract-ocr \
            tesseract-ocr-ces

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install Python dependencies
        run: .venv/bin/pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          ANNUAL_THRESHOLD_CZK: "1676052"
        run: .venv/bin/pytest backend/tests/ -v

  build-containers:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout source code
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetches full history for better caching/context
      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      # 3. Cache Docker layers
      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: ${{ runner.os }}-buildx-
      # 4. Extract metadata
      - name: Extract metadata
        id: meta
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      # 5. Build dev Docker image
      - name: Build Docker image for tests
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          tags: tax-calculator-backend:latest
          load: true # Load to local Docker daemon for testing
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
      # 6. Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      # 7. Build and push prod image
      - name: Build and push production image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: backend/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKERHUB_PROJECT_NAME }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ secrets.DOCKERHUB_PROJECT_NAME }}:${{ steps.meta.outputs.SHORT_SHA }}
          cache-from: type=local,src=/tmp/.buildx-cache
