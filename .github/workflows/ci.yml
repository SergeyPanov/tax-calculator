name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    # Mirrors the Nix dev environment declared in shell.nix:
    #   pkgs.python3       -> actions/setup-python@v5 (python-version: "3.12")
    #   pkgs.poppler-utils -> apt: poppler-utils
    #   pkgs.tesseract     -> apt: tesseract-ocr, tesseract-ocr-ces (Czech language data)
    #   pkgs.git           -> apt: git
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies (mirrors shell.nix)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            git \
            poppler-utils \
            tesseract-ocr \
            tesseract-ocr-ces

      - name: Create virtual environment
        run: python -m venv .venv

      - name: Install Python dependencies
        run: .venv/bin/pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
          ANNUAL_THRESHOLD_CZK: "1676052"
        run: .venv/bin/pytest backend/tests/ -v

  build-containers:
    runs-on: ubuntu-latest
    needs: tests
    strategy:
      matrix:
        include:
          - service: backend
            context: .
            dockerfile: backend/Dockerfile
            dockerhub-project-name: tax-calculator
            build_args: ""

          - service: frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile
            dockerhub-project-name: tax-calculator-frontend
            build_args: |
              NEXT_PUBLIC_BACKEND_URL=${{ vars.NEXT_PUBLIC_BACKEND_URL }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Fetches full history for better caching/context

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Cache Docker layers
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: ${{ runner.os }}-buildx-

      - name: Extract metadata
        id: meta
        run: |
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image for tests
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: ${{ matrix.service }}:latest
          load: true # Load to local Docker daemon for testing
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push production image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.ref == 'refs/heads/main' && github.event_name == 'push' }}
          build-args: ${{ matrix.build_args }}
          platforms: linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.dockerhub-project-name }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ matrix.dockerhub-project-name }}:${{ steps.meta.outputs.SHORT_SHA }}
          cache-from: type=local,src=/tmp/.buildx-cache
